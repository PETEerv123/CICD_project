name: ESP-IDF CI

on:
  push:
    branches: [ "SPI_Unit_Test" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3
          target: esp32c3

      - name: Full clean
        run: |
          rm -rf build
          idf.py fullclean || true

      - name: Build project
        run: |
          idf.py set-target esp32c3
          idf.py build
