name: ESP-IDF CI

on:
  push:
    branches: [ "SPI_Unit_Test" ]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git wget flex bison gperf python3 python3-pip python3-venv \
            cmake ninja-build ccache libffi-dev libssl-dev dfu-util

      - name: Set up ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3   # Use a recent stable release, or 'latest'
          target: esp32c3

      - name: Clean previous build (optional)
        run: |
          rm -rf build sdkconfig

      - name: Build project
        run: |
          # idf.py will automatically use the environment set up by the action
          idf.py set-target esp32c3   # optional if you already set target above
          idf.py build
