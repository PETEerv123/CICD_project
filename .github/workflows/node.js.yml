name: ESP32 SPI Unit Test

on:
  push:
    branches: [ "SPI_Unit_Test" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2

      - name: Force clean
        run: |
          rm -rf build
          rm -f sdkconfig
          rm -f sdkconfig.old

      - name: Set target
        run: idf.py set-target esp32c3

      - name: Build
        run: idf.py build
