name: ESP32 Hardware Test

on:
  push:
    branches: [ "SPI_Unit_Test" ]
jobs:
  test-on-hardware:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load ESP-IDF
        run: |
          source ~/esp-idf/export.sh
      - name: Clean build
        run: |
          rm -rf build
      - name: Set target
        run: |
          . $HOME/esp-idf/export.sh
          idf.py set-target esp32
      - name: Build
        run: |
          . $HOME/esp-idf/export.sh
          idf.py build
          