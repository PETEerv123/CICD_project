name: ESP32C3 SPI Unit Test

on:
  push:
    branches: [ "SPI_Unit_Test" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2
          target: esp32c3

      - name: Clean
        run: |
          rm -rf build
          rm -f sdkconfig*

      - name: Build
        run: idf.py build
