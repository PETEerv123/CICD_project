name: ESP32C3 SPI Unit Test

on:
  push:
    branches: [ "CICD_Pytest" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2

      - name: Override target to esp32c3
        run: |
          unset IDF_TARGET                   
          echo "IDF_TARGET=esp32c3" >> $GITHUB_ENV
          idf.py fullclean
          idf.py set-target esp32c3

      - name: Build
        run: idf.py build
